<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Detalle Mágico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="canvas" id="canvas">
        <div class="envelope-wrapper" id="envelope">
            <div class="envelope">
                <div class="flap"></div>
                <div class="body"></div>
                <div class="text">Toca para abrir 🌟</div>
            </div>
        </div>
    </div>

    <script>
        const envelope = document.getElementById('envelope');
        const canvas = document.getElementById('canvas');
        // Lista de partículas: Solo estrellas y flores
        const particles = ['✨', '🌸', '⭐', '🌷', '🌼', '🌟'];

        envelope.addEventListener('click', () => {
            // Ocultar la carta con un pequeño efecto de escala
            envelope.style.transition = 'transform 0.2s ease-out, opacity 0.2s ease-out';
            envelope.style.transform = 'scale(0) rotate(10deg)';
            envelope.style.opacity = '0';

            // Crear explosión después de que la carta desaparezca un poco
            setTimeout(() => {
                envelope.style.display = 'none';
                for (let i = 0; i < 60; i++) { // Aumenté la cantidad a 60
                    createParticle();
                }
            }, 200);
        });

        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            // Elegir un emoji aleatorio de la lista
            particle.innerHTML = particles[Math.floor(Math.random() * particles.length)];
            
            // Posición inicial en el centro de la pantalla
            const x = window.innerWidth / 2;
            const y = window.innerHeight / 2;
            
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            
            // Dirección y distancia aleatoria para la "explosión"
            const angle = Math.random() * Math.PI * 2; // Ángulo aleatorio 360 grados
            const distance = 100 + Math.random() * 400; // Distancia aleatoria
            
            const destinationX = Math.cos(angle) * distance;
            const destinationY = Math.sin(angle) * distance;
            const rotation = (Math.random() - 0.5) * 720; // Rotación aleatoria fuerte

            canvas.appendChild(particle);

            // Animación de la partícula
            const animation = particle.animate([
                { transform: 'translate(-50%, -50%) translate(0, 0) scale(1)', opacity: 1 },
                { transform: `translate(-50%, -50%) translate(${destinationX}px, ${destinationY}px) scale(${1.5 + Math.random()}) rotate(${rotation}deg)`, opacity: 0 }
            ], {
                duration: 1800 + Math.random() * 1200, // Duración variada
                easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)', // Suavizado de salida
                fill: 'forwards'
            });

            // Eliminar el elemento cuando termine la animación
            animation.onfinish = () => particle.remove();
        }
    </script>
</body>
</html>
